<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一级按钮 Demo</title>
  <link rel="stylesheet" href="../../styles/tokens.css">
  <link rel="stylesheet" href="BtnPrimary.css">
  <style>
    /* 字体引用：Font/Switzer，见 docs/Font.md */
    @font-face { font-family: 'Switzer'; src: url('../../Font/Switzer/Gate-Switzer-Regular.ttf') format('truetype'); font-weight: 400; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Switzer'; src: url('../../Font/Switzer/Gate-Switzer-Medium.ttf') format('truetype'); font-weight: 500; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Switzer'; src: url('../../Font/Switzer/Gate-Switzer-Semibold.ttf') format('truetype'); font-weight: 600; font-style: normal; font-display: swap; }

  </style>
</head>
<body style="padding: 40px; font-family: Switzer, -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Segoe UI', sans-serif;">
  <h2>一级按钮</h2>
  <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-top: 16px;">
    <button class="btn-primary btn-primary--sm">小号</button>
    <button class="btn-primary">默认</button>
    <button class="btn-primary btn-primary--lg">大号</button>
  </div>

</html>
